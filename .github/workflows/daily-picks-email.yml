name: Daily picks email
# Runs each morning BEFORE the day's games: rebuilds the multi-slip acca
# images (6 legs per slip) and the top-bankers cards (top 2 per engine,
# 6 games per card) from the current data.js, commits them, and emails
# EVERY slip/card as attachments. Reuses the same Gmail secrets.

on:
  schedule:
    - cron: "15 0 * * *"     # 00:15 UTC daily - ~45 min before the 01:00 GMT kickoffs, using the 21:00 data run
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  picks:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Build acca slips + top-banker cards
        run: |
          npm install sharp --no-save || echo "sharp install issue"
          # remove yesterday's page files first, so stale slips never linger,
          # get re-committed, or get re-attached by the glob below
          rm -f acca-*.png acca-*.svg today-*.png today-*.svg
          node generate-acca.js  || echo "acca generation skipped"
          node generate-image.js || echo "top-bankers generation skipped"
      - name: Commit the images (if changed)
        run: |
          git config user.name "predicto-bot"
          git config user.email "bot@users.noreply.github.com"
          # per-path guarded adds — a missing file must never kill the job
          # -A stages DELETIONS of stale pages as well as new files
          git add -A -- 'acca*' 'today*' 2>/dev/null || true
          for p in daily/; do
            git add -- $p 2>/dev/null || echo "note: $p not present - skipped"
          done
          if git diff --staged --quiet; then echo "Nothing staged."; exit 0; fi
          git commit -m "Daily picks images (acca slips + top-banker cards)"
          PUSHED=0
          for i in 1 2 3 4 5; do
            git pull --rebase --autostash origin main || { sleep $((5*i)); continue; }
            if git push origin HEAD:main; then echo "pushed (attempt $i)."; PUSHED=1; break; fi
            echo "Push attempt $i failed — retrying..."; sleep $((5 * i))
          done
          if [ "$PUSHED" != "1" ]; then echo "ERROR: failed to push after 5 attempts."; exit 1; fi
      - name: Collect attachment list
        id: att
        run: |
          FILES=$(ls acca.png acca-*.png today.png today-*.png 2>/dev/null | sort -u | paste -sd, -)
          echo "list=$FILES" >> "$GITHUB_OUTPUT"
          echo "Attaching: $FILES"
      - name: Email the picks images
        if: ${{ steps.att.outputs.list != '' }}
        continue-on-error: true
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "Predict2u — Today's Bankers (acca slips + top picks)"
          to: predict2u@gmail.com
          from: Predict2u Bot
          body: |
            Today's picks attached:
            - Acca slips (6 legs per image, all engines consulted, no repeats)
            - Top-banker cards (top 2 from every engine, 6 games per card)

            Full board at predict2u.com
            Heuristic picks, not guarantees. 18+. Gamble responsibly.
          attachments: ${{ steps.att.outputs.list }}
