name: Predict2U Fast All Games

on:
  schedule:
    - cron: "15 2,14 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: predict2u-data-write
  cancel-in-progress: false

jobs:
  discover:
    name: Discover every active league
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Discover all games and balance work
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          API_KEY: ${{ secrets.API_KEY }}
          SEASON: ${{ secrets.SEASON }}
          DAYS_BACK: ${{ secrets.DAYS_BACK }}
          DAYS_FWD: ${{ secrets.DAYS_FWD }}
          SHARD_COUNT: "6"
          DISCOVERY_CONCURRENCY: "3"
        run: node discover-all-games.js

      - name: Export shard matrix
        id: matrix
        shell: bash
        run: echo "matrix=$(cat all-games-matrix.json)" >> "$GITHUB_OUTPUT"

      - name: Upload discovery manifest
        uses: actions/upload-artifact@v4
        with:
          name: all-games-discovery
          path: |
            all-games-discovery.json
            all-games-matrix.json
          retention-days: 2

  enrich:
    name: Enrich shard ${{ matrix.index }}
    needs: discover
    runs-on: ubuntu-latest
    timeout-minutes: 180
    strategy:
      fail-fast: false
      max-parallel: 6
      matrix: ${{ fromJSON(needs.discover.outputs.matrix) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build shard configuration
        shell: bash
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          API_KEY: ${{ secrets.API_KEY }}
          STATS_API_KEY: ${{ secrets.STATS_API_KEY }}
          SEASON: ${{ secrets.SEASON }}
          DAYS_BACK: ${{ secrets.DAYS_BACK }}
          DAYS_FWD: ${{ secrets.DAYS_FWD }}
          ODDS: ${{ secrets.ODDS }}
          H2H: ${{ secrets.H2H }}
          REQUEST_BUDGET: ${{ secrets.REQUEST_BUDGET }}
          SLEEP_MS: ${{ secrets.SLEEP_MS }}
          SHARD_LEAGUES: ${{ matrix.leagues }}
        run: |
          set -euo pipefail
          football_key="${API_FOOTBALL_KEY:-${API_KEY:-}}"
          if [[ -z "$football_key" ]]; then
            echo "Missing API_FOOTBALL_KEY or API_KEY"
            exit 1
          fi
          cat > config.txt <<EOF
          API_KEY=${football_key}
          STATS_API_KEY=${STATS_API_KEY:-}
          SEASON=${SEASON:-$(date -u +%Y)}
          LEAGUES=${SHARD_LEAGUES}
          DAYS_BACK=${DAYS_BACK:-0}
          DAYS_FWD=${DAYS_FWD:-6}
          ODDS=${ODDS:-true}
          H2H=${H2H:-true}
          STATS=true
          MAX_LEAGUES=0
          MAX_PROBES=10000
          REQUEST_BUDGET=${REQUEST_BUDGET:-12000}
          SLEEP_MS=${SLEEP_MS:-1500}
          EOF
          echo "Shard ${{ matrix.index }}: ${{ matrix.expectedFixtures }} expected fixture(s) across ${SHARD_LEAGUES}"

      - name: Pull and enrich shard
        env:
          P2U_FAST_SHARD: "1"
        run: node fetch-data.js

      - name: Upload shard data
        uses: actions/upload-artifact@v4
        with:
          name: fixture-shard-${{ matrix.index }}
          path: |
            data.js
            api-cache.json
          if-no-files-found: error
          retention-days: 2

  merge:
    name: Merge, verify and publish
    needs: [discover, enrich]
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Download all fixture shards
        uses: actions/download-artifact@v4
        with:
          pattern: fixture-shard-*
          path: shards
          merge-multiple: false

      - name: Download discovery manifest
        uses: actions/download-artifact@v4
        with:
          name: all-games-discovery
          path: discovery

      - name: Merge every shard
        run: node merge-fixture-shards.js shards discovery/all-games-discovery.json

      - name: Enrich merged data with Stats API
        env:
          STATS_API_KEY: ${{ secrets.STATS_API_KEY }}
        run: node enrich-xg.js
        continue-on-error: true

      - name: Rebuild calibration and model reports once
        run: node rebuild-derived-data.js

      - name: Verify seven-day coverage
        run: node verify-week-data.js

      - name: Generate public health snapshot
        run: node generate-site-health.js
        continue-on-error: true

      - name: Run repository consistency audit
        run: node audit-site.js
        continue-on-error: true

      - name: Commit updated all-games data
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "Predict2U Fixture Bot"
          git config user.email "actions@users.noreply.github.com"
          git add \
            data.js \
            api-cache.json \
            all-games-discovery.json \
            week-fixture-report.json \
            team-profiles.json \
            odds-calib.json \
            model-calibration.json \
            engine-learning-ledger.json \
            engine-learning-report.json \
            engine-consensus-report.json \
            match-context-report.json \
            model-governance-report.json \
            model-governance-audit.json \
            site-health.json \
            site-audit.json 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "No all-games changes to commit."
            exit 0
          fi
          git commit -m "Fast update of all seven-day fixtures"
          git pull --rebase
          git push
