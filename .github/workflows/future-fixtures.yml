name: Predict2U Fast All Games

on:
  schedule:
    - cron: "15 2,14 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: predict2u-data-write
  cancel-in-progress: false

jobs:
  discover:
    name: Discover every active league
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Discover all games and balance work
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          API_KEY: ${{ secrets.API_KEY }}
          SEASON: ${{ secrets.SEASON }}
          DAYS_BACK: ${{ secrets.DAYS_BACK }}
          DAYS_FWD: ${{ secrets.DAYS_FWD }}
          SHARD_COUNT: "6"
          DISCOVERY_CONCURRENCY: "3"
        run: node discover-all-games.js

      - name: Upload discovery manifest
        uses: actions/upload-artifact@v4
        with:
          name: all-games-discovery
          path: |
            all-games-discovery.json
            all-games-fixtures.json
            all-games-matrix.json
          if-no-files-found: error
          retention-days: 2

  enrich:
    name: Enrich shard ${{ matrix.index }}
    needs: discover
    runs-on: ubuntu-latest
    timeout-minutes: 180
    strategy:
      fail-fast: false
      max-parallel: 6
      matrix:
        index: [0, 1, 2, 3, 4, 5]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Restore API response cache outside Git
        if: env.HAS_WORK != 'false'
        uses: actions/cache/restore@v4
        with:
          path: api-cache.json
          key: p2u-api-cache-${{ runner.os }}-${{ github.run_id }}-${{ matrix.index }}
          restore-keys: |
            p2u-api-cache-${{ runner.os }}-

      - name: Download discovery manifest
        uses: actions/download-artifact@v4
        with:
          name: all-games-discovery
          path: discovery

      - name: Resolve this shard from the discovery manifest
        env:
          SHARD_INDEX: ${{ matrix.index }}
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require('fs');
          const path = require('path');

          const manifestPath = path.join('discovery', 'all-games-discovery.json');
          const manifest = JSON.parse(fs.readFileSync(manifestPath, 'utf8'));
          const index = Number(process.env.SHARD_INDEX);
          const shard = Array.isArray(manifest.shards)
            ? manifest.shards.find(item => Number(item.index) === index)
            : null;

          const envFile = process.env.GITHUB_ENV;
          if (!envFile) throw new Error('GITHUB_ENV is not available.');

          if (!shard || !String(shard.leagues || '').trim()) {
            fs.appendFileSync(envFile, 'HAS_WORK=false\n');
            fs.appendFileSync(envFile, 'SHARD_LEAGUES=\n');
            fs.appendFileSync(envFile, 'EXPECTED_FIXTURES=0\n');
            console.log(`Shard ${index} has no work and will be skipped.`);
          } else {
            fs.appendFileSync(envFile, 'HAS_WORK=true\n');
            fs.appendFileSync(envFile, `SHARD_LEAGUES=${String(shard.leagues).trim()}\n`);
            fs.appendFileSync(envFile, `EXPECTED_FIXTURES=${Number(shard.expectedFixtures || 0)}\n`);
            console.log(`Shard ${index}: ${Number(shard.expectedFixtures || 0)} expected fixture(s).`);
          }
          NODE

      - name: Build shard configuration
        if: env.HAS_WORK == 'true'
        shell: bash
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          API_KEY: ${{ secrets.API_KEY }}
          STATS_API_KEY: ${{ secrets.STATS_API_KEY }}
          SEASON: ${{ secrets.SEASON }}
          DAYS_BACK: ${{ secrets.DAYS_BACK }}
          DAYS_FWD: ${{ secrets.DAYS_FWD }}
          ODDS: ${{ secrets.ODDS }}
          H2H: ${{ secrets.H2H }}
          REQUEST_BUDGET: ${{ secrets.REQUEST_BUDGET }}
          SLEEP_MS: ${{ secrets.SLEEP_MS }}
        run: |
          set -euo pipefail
          football_key="${API_FOOTBALL_KEY:-${API_KEY:-}}"
          if [[ -z "$football_key" ]]; then
            echo "Missing API_FOOTBALL_KEY or API_KEY"
            exit 1
          fi

          cat > config.txt <<EOF
          API_KEY=${football_key}
          STATS_API_KEY=${STATS_API_KEY:-}
          SEASON=${SEASON:-$(date -u +%Y)}
          LEAGUES=${SHARD_LEAGUES}
          DAYS_BACK=${DAYS_BACK:-0}
          DAYS_FWD=${DAYS_FWD:-6}
          ODDS=${ODDS:-true}
          H2H=${H2H:-true}
          STATS=true
          MAX_LEAGUES=0
          MAX_PROBES=10000
          REQUEST_BUDGET=${REQUEST_BUDGET:-12000}
          SLEEP_MS=${SLEEP_MS:-1500}
          EOF

          echo "Shard ${{ matrix.index }} will process ${EXPECTED_FIXTURES} expected fixture(s)."

      - name: Pull and enrich shard
        if: env.HAS_WORK == 'true'
        env:
          P2U_FAST_SHARD: "1"
          P2U_DISCOVERY_FILE: "discovery/all-games-fixtures.json"
        run: node fetch-data.js

      - name: Upload shard data
        if: env.HAS_WORK == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: fixture-shard-${{ matrix.index }}
          path: |
            data.js
            api-cache.json
          if-no-files-found: error
          retention-days: 2

  merge:
    name: Merge, verify and publish
    needs: [discover, enrich]
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Restore Odds API cache outside Git
        uses: actions/cache/restore@v4
        with:
          path: odds-api-cache.json
          key: p2u-odds-api-cache-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            p2u-odds-api-cache-${{ runner.os }}-

      - name: Repair generated files before merge
        run: node repair-generated-conflicts.js

      - name: Download all fixture shards
        uses: actions/download-artifact@v4
        with:
          pattern: fixture-shard-*
          path: shards
          merge-multiple: false

      - name: Download discovery manifest
        uses: actions/download-artifact@v4
        with:
          name: all-games-discovery
          path: discovery

      - name: Merge every shard
        run: node merge-fixture-shards.js shards discovery/all-games-discovery.json discovery/all-games-fixtures.json

      - name: Enrich missing and half-time markets with Odds API
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          ODDS_API_REGIONS: "uk"
          ODDS_API_MAX_EVENTS: "120"
        run: node enrich-odds-api.js
        continue-on-error: true

      - name: Save Odds API cache outside Git
        if: ${{ hashFiles('odds-api-cache.json') != '' }}
        uses: actions/cache/save@v4
        with:
          path: odds-api-cache.json
          key: p2u-odds-api-cache-${{ runner.os }}-${{ github.run_id }}

      - name: Save merged API response cache outside Git
        uses: actions/cache/save@v4
        with:
          path: api-cache.json
          key: p2u-api-cache-${{ runner.os }}-${{ github.run_id }}

      - name: Enrich merged data with Stats API
        env:
          STATS_API_KEY: ${{ secrets.STATS_API_KEY }}
        run: node enrich-xg.js
        continue-on-error: true

      - name: Rebuild calibration and model reports once
        run: node rebuild-derived-data.js

      - name: Verify seven-day coverage
        env:
          P2U_MIN_DISCOVERY_COVERAGE: "1"
        run: node verify-week-data.js

      - name: Confirm generated fixture reports
        shell: bash
        run: |
          set -euo pipefail
          required=(
            data.js
            all-games-discovery.json
            fixture-coverage-report.json
            week-fixture-report.json
          )
          for file in "${required[@]}"; do
            if [[ ! -s "$file" ]]; then
              echo "Missing or empty required output: $file"
              exit 1
            fi
          done
          echo "Generated fixture outputs:"
          ls -lh "${required[@]}"

      - name: Generate public health snapshot
        run: node generate-site-health.js
        continue-on-error: true

      - name: Run repository consistency audit
        run: node audit-site.js
        continue-on-error: true

      - name: Compact generated match data
        run: node compact-generated-data.js

      - name: Commit updated all-games data
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "Predict2U Fixture Bot"
          git config user.email "actions@users.noreply.github.com"

          # api-cache.json is a runtime cache, not a publishable site file.
          # Remove an older tracked copy, then publish only web/report outputs.
          git rm --cached -f --ignore-unmatch api-cache.json 2>/dev/null || true
          git add -f -- \
            data.js \
            all-games-discovery.json \
            week-fixture-report.json \
            fixture-coverage-report.json

          optional=(
            team-profiles.json
            odds-calib.json
            model-calibration.json
            engine-learning-ledger.json
            engine-learning-report.json
            engine-consensus-report.json
            match-context-report.json
            odds-api-coverage.json
            model-governance-report.json
            model-governance-audit.json
            site-health.json
            site-audit.json
          )
          for file in "${optional[@]}"; do
            [[ -e "$file" ]] && git add -f -- "$file"
          done

          echo "Files staged for publication:"
          git status --short

          if git diff --cached --quiet; then
            echo "Generated reports already match the repository. Nothing to commit."
            exit 0
          fi

          git commit -m "Publish seven-day fixture data and reports"

          pushed=0
          for attempt in 1 2 3 4 5; do
            git fetch origin "${GITHUB_REF_NAME}"
            if ! git rebase -X theirs "origin/${GITHUB_REF_NAME}"; then
              git rebase --abort 2>/dev/null || true
              sleep $((attempt * 5))
              continue
            fi
            node repair-generated-conflicts.js
            node compact-generated-data.js
            git rm --cached -f --ignore-unmatch api-cache.json 2>/dev/null || true
            git add -f -- data.js track-log.json 2>/dev/null || true
            if ! git diff --cached --quiet; then
              git commit --amend --no-edit
            fi
            if git push origin "HEAD:${GITHUB_REF_NAME}"; then
              pushed=1
              break
            fi
            sleep $((attempt * 5))
          done
          [[ "$pushed" == "1" ]] || { echo "Could not publish after five attempts."; exit 1; }
