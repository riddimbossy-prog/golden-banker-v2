name: Predict2U Fast Fixture Snapshot

on:
  schedule:
    - cron: "20 0,6,12,18 * * *"
  workflow_dispatch:
  workflow_run:
    workflows: ["Predict2U Fast All Games"]
    types: [completed]
    branches: [main]

permissions:
  contents: write

concurrency:
  group: predict2u-data-write
  cancel-in-progress: false

jobs:
  snapshot:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    name: Pull and publish seven-day fixtures
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Pull every fixture by date safely
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          API_KEY: ${{ secrets.API_KEY }}
          DAYS_BACK: "0"
          DAYS_FWD: ${{ secrets.DAYS_FWD }}
          FIXTURE_CONCURRENCY: "1"
          FIXTURE_REQUEST_GAP_MS: "13000"
          FIXTURE_RATE_LIMIT_WAIT_MS: "65000"
          FIXTURE_MAX_RETRIES: "6"
        run: node fetch-fixtures-snapshot.js

      - name: Verify fixture snapshot
        run: node verify-fixture-snapshot.js

      - name: Commit fixture feed
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "Predict2U Fixture Snapshot Bot"
          git config user.email "actions@users.noreply.github.com"

          git add -f -- fixtures.js fixture-snapshot-report.json
          if git diff --cached --quiet; then
            echo "Fixture snapshot already matches the repository."
            exit 0
          fi

          git commit -m "Refresh seven-day fixture snapshot"

          for attempt in 1 2 3; do
            git pull --rebase origin "${GITHUB_REF_NAME}"
            if git push origin "HEAD:${GITHUB_REF_NAME}"; then
              exit 0
            fi
            echo "Push attempt ${attempt} failed; retrying."
            sleep $((attempt * 5))
          done

          echo "Could not publish fixture snapshot after three attempts."
          exit 1
