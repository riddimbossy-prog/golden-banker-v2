name: Update Predicto data

# Runs daily on a schedule, and can be triggered by hand from the
# "Actions" tab. Fetches fresh match data AND publishes the site to
# GitHub Pages in the same run, so the live site always matches the data.
on:
  schedule:
    - cron: "0 */2 * * *"    # every 2 hours, on the hour (UTC)
  workflow_dispatch: {}       # manual "Run workflow" button

# Needed to commit data.js AND to deploy GitHub Pages
permissions:
  contents: write
  pages: write
  id-token: write

# Avoid overlapping Pages deployments
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Write config.txt from secrets
        run: |
          cat > config.txt <<EOF
          API_KEY=${{ secrets.API_KEY }}
          SEASON=${{ secrets.SEASON }}
          LEAGUES=${{ secrets.LEAGUES }}
          MAX_LEAGUES=${{ secrets.MAX_LEAGUES }}
          ODDS=${{ secrets.ODDS }}
          H2H=${{ secrets.H2H }}
          EOF

      - name: Run the fetcher
        run: node fetch-data.js

      - name: Commit updated data.js (if it changed)
        run: |
          git config user.name "predicto-bot"
          git config user.email "bot@users.noreply.github.com"
          if ! git diff --quiet data.js; then
            git add data.js
            git commit -m "Auto-update match data"
            git push
            echo "data.js updated and pushed."
          else
            echo "No data changes today."
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
