name: Update Predicto data
# Runs on a schedule, and can be triggered by hand from the "Actions"
# tab (or by the cron-job.org pinger). Fetches fresh match data AND
# publishes the site to GitHub Pages in the same run, so the live site
# always matches the data.
on:
  schedule:
    - cron: "0 */2 * * *"    # every 2 hours, on the hour (UTC)
  workflow_dispatch: {}       # manual "Run workflow" button
# Needed to commit data.js AND to deploy GitHub Pages
permissions:
  contents: write
  pages: write
  id-token: write
# Avoid overlapping Pages deployments
concurrency:
  group: "pages"
  cancel-in-progress: false
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Write config.txt from secrets
        run: |
          cat > config.txt <<EOF
          API_KEY=${{ secrets.API_KEY }}
          SEASON=${{ secrets.SEASON }}
          LEAGUES=${{ secrets.LEAGUES }}
          MAX_LEAGUES=${{ secrets.MAX_LEAGUES }}
          MAX_PROBES=${{ secrets.MAX_PROBES }}
          ODDS=${{ secrets.ODDS }}
          H2H=${{ secrets.H2H }}
          STATS=${{ secrets.STATS }}
          DAYS_BACK=${{ secrets.DAYS_BACK }}
          DAYS_FWD=${{ secrets.DAYS_FWD }}
          REQUEST_BUDGET=${{ secrets.REQUEST_BUDGET }}
          SLEEP_MS=${{ secrets.SLEEP_MS }}
          STATS_API_KEY=${{ secrets.STATS_API_KEY }}
          EOF
      - name: Run the fetcher
        run: node fetch-data.js
      - name: Enrich with real xG (TheStatsAPI)
        run: node enrich-xg.js || echo "xG enrichment skipped (site unaffected)"
      - name: Generate daily branded image
        run: |
          npm install sharp --no-save || echo "sharp install issue"
          node generate-image.js || echo "image generation skipped"
          node generate-acca.js || echo "acca image skipped"
      - name: Commit updated data.js (if it changed)
        run: |
          git config user.name "predicto-bot"
          git config user.email "bot@users.noreply.github.com"
          if ! git diff --quiet data.js today.png today.svg daily/ 2>/dev/null || [ -n "$(git status --porcelain today.png acca.png daily/ 2>/dev/null)" ]; then
            git add data.js today.png today.svg acca.png acca.svg daily/ 2>/dev/null || git add data.js
            git commit -m "Auto-update match data + daily image"
            # The run can take many minutes; main may have moved meanwhile.
            # Rebase our data.js commit on top of any new remote changes, then
            # push. Retry once in case of a race. data.js is the only file we
            # touch, so a rebase can't conflict with code edits.
            for i in 1 2 3; do
              git pull --rebase --autostash origin main && git push && { echo "data.js updated and pushed."; break; }
              echo "Push attempt $i failed (remote moved) — retrying after sync..."
              sleep 5
            done
          else
            echo "No data changes today."
          fi
      - name: Email the daily branded image
        if: ${{ hashFiles('today.png') != '' }}
        continue-on-error: true
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "Predict2u — Today's Top Bankers"
          to: predict2u@gmail.com
          from: Predict2u Bot
          body: |
            Today's top bankers (one strongest pick per engine) are attached.
            Also live at predict2u.com/today.png
            Heuristic picks, not guarantees. 18+.
          attachments: today.png,acca.png
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload site as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
