name: Update scores (fast)
# Lightweight: updates ONLY match scores/status from the API every 15 minutes,
# so finished games settle quickly without waiting for the slow full fetch.
# Does NOT refetch stats/odds/standings. Runs in ~1-2 minutes.
on:
  schedule:
    - cron: "*/15 * * * *"   # every 15 minutes (GitHub cron is best-effort;
                              # also pinged by cron-job.org for reliability)
  workflow_dispatch: {}
permissions:
  contents: write
  pages: write
  id-token: write
# CONCURRENCY (fixed): this scheduled job runs in its OWN group so it can never
# cancel a manual "Publish daily image" deploy that is mid-flight. If a scores
# run is already going, a new scores run just waits (does not pile up), and it
# never touches the publish lane. This ends the "higher priority waiting
# request for pages-deploy" cancellations.
concurrency:
  group: "pages-scores"
  cancel-in-progress: false
jobs:
  scores:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Inject secret keys into config.txt (preserve committed LEAGUES etc.)
        run: |
          # The repo's committed config.txt holds LEAGUES, SEASON, DAYS_*, budgets.
          # We must NOT overwrite it — only append the secret API keys so the
          # fetcher has credentials. Appended keys win (parser takes last value).
          if [ ! -f config.txt ]; then echo "WARNING: config.txt missing from repo"; fi
          {
            echo "";
            echo "API_KEY=${{ secrets.API_KEY }}";
            echo "STATS_API_KEY=${{ secrets.STATS_API_KEY }}";
          } >> config.txt

      - name: Update scores only
        run: node fetch-scores.js || echo "scores update skipped"
      - name: Update forward tracker (settle + record bankers)
        run: node track-log.js || echo "track-log skipped"
      - name: Restore clean config.txt before commit
        run: |
          git checkout -- config.txt 2>/dev/null || rm -f config.txt
      - name: Commit updated scores (if changed)
        run: |
          git config user.name "predicto-bot"
          git config user.email "bot@users.noreply.github.com"
          if [ -z "$(git status --porcelain data.js track-log.json)" ]; then
            echo "No changes."; exit 0
          fi
          git add data.js track-log.json
          git commit -m "Update scores + forward tracker"
          # data.js / track-log.json are GENERATED — on a race with the full data
          # fetch, take OUR fresh copy rather than dying on an unmergeable rebase.
          for i in 1 2 3 4 5; do
            git fetch origin main
            if git rebase origin/main; then
              :
            else
              echo "Rebase conflict on generated files — keeping our fresh copies."
              git checkout --ours data.js track-log.json 2>/dev/null || true
              git add data.js track-log.json 2>/dev/null || true
              GIT_EDITOR=true git rebase --continue || git rebase --abort
            fi
            if git push origin HEAD:main; then echo "pushed (attempt $i)."; break; fi
            echo "Push attempt $i failed (remote moved) — syncing and retrying..."; sleep $((5 * i))
          done
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload site as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."
  deploy:
    needs: scores
    runs-on: ubuntu-latest
    # This deploy shares the DEPLOY lane with the manual publish, but WAITS for
    # an in-flight publish instead of cancelling it (cancel-in-progress:false).
    concurrency:
      group: "pages-deploy"
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
